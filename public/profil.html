<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil</title>

  <link rel="stylesheet" href="profil.css?v=6">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<nav id="barre-gauche">
  <button id="accueil">Accueil</button>
  <button id="profil">Profil</button>
  <button id="musique-fond">Musique</button>
  <button id="personnalisation">Personnalisation</button>
</nav>

<div id="contenu">

  <!-- HEADER -->
  <div id="entete-profil">
    <img id="photo-profil" src="" alt="photo">

    <div id="infos-profil">
      <p id="pseudo">pseudo</p>

      <div id="stats">
        <span><strong>0</strong> musiques</span>
        <span><strong>0</strong> collections</span>
        <span><strong>0</strong> likes</span>
      </div>

      <p id="bio">bio</p>

      <div id="actions-profil"></div>
    </div>
  </div>

  <div id="onglets">
    <button id="tab-postes" class="active">Postes</button>
    <button id="tab-collections">Collections</button>
    <button id="tab-identifications">Identifications</button>
    <button id="tab-reposts">Reposts</button>
  </div>

  <div id="barre-options">
    <div id="toggle-affichage" aria-label="Mode d'affichage">
      <button id="btn-grille" class="actif" type="button">Grille</button>
      <button id="btn-liste" type="button">Liste</button>
    </div>
    <div id="actions-onglet"></div>
  </div>

  <div id="zone-musiques" class="grille"></div>

</div>

<div id="app-modale" class="modale-cachee" aria-hidden="true"></div>
<audio id="audio-fond" loop></audio>

<script type="module" src="profil.js?v=6"></script>
</body>
</html>
